name: "dbt_health_codes"
version: "0.4.0"
config-version: 2

require-dbt-version: [">=1.6.0", "<2.0.0"]

profile: "default"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  dbt_health_codes:
    +quote_columns: true
    # We deliberately don't force column_types here — warehouse adapters auto-
    # detect types from the CSV and get it right in every target we've tested
    # (DuckDB, Postgres). Forcing types tripped up TIMESTAMP WITH TIME ZONE
    # detection on valid_from. If your warehouse misdetects, override in your
    # consuming project's dbt_project.yml under seeds: dbt_health_codes: etc.
