name: "dbt_health_codes"
version: "0.5.1"
config-version: 2

require-dbt-version: [">=1.6.0", "<2.0.0"]

profile: "default"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  dbt_health_codes:
    +quote_columns: true
    # Force code column to varchar — DuckDB's CSV sniffer infers INTEGER for
    # all-numeric code samples and then crashes on leading-zero NDCs
    # (e.g. "03215012014") that must be preserved as strings. The sniffer hit
    # was non-deterministic (depends on sample window); forcing varchar is the
    # robust fix. valid_from / valid_to continue to auto-detect as timestamptz.
    +column_types:
      code: varchar
